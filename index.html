<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Global | World Operations</title>
    
    <!-- Fonts, Icons & Map CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">

    <style>
        /* Map must have a height to show up */
        #map { height: 350px; width: 100%; border-radius: 10px; margin: 20px 0; border: 1px solid var(--gold); background: #000; }
        .leaflet-tile-pane { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg); }
    </style>
</head>
<body>

    <div class="ops-ticker"><div class="ticker-track" id="tickerTrack"></div></div>

    <nav>
        <div class="nav-container">
            <div class="brand-block" onclick="showPage('home')">
                <img src="logo.png" alt="Logo" style="height:40px; mix-blend-mode:screen;">
                <div class="brand-text"><b style="display:block;font-size:1rem;">SKYLINE GLOBAL</b><span style="color:var(--cyan);font-size:0.7rem;">FINCLOGISTICS</span></div>
            </div>
            <ul class="nav-links">
                <li onclick="showPage('home')">OVERVIEW</li>
                <li onclick="showPage('dashboard')" class="nav-cta">OPERATIONS CONSOLE</li>
            </ul>
        </div>
    </nav>

    <main id="app">
        <!-- HOME PAGE -->
        <section id="home" class="view active">
            <div class="hero">
                <video class="video-bg" autoplay muted loop playsinline><source src="bg-video.mp4" type="video/mp4"></video>
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <p style="letter-spacing:5px; color:var(--gold); font-weight:700;">ESTABLISHED 2014</p>
                    <h1 style="font-size:3rem; margin:10px 0;">SKYLINE GLOBAL</h1>
                    <div class="track-module" style="background:rgba(255,255,255,0.1); padding:20px; border-radius:10px; display:flex; gap:10px; max-width:500px; margin:0 auto;">
                        <input type="text" id="manifestID" placeholder="Enter ID (e.g. SK-777)" style="flex:2; padding:15px; border-radius:5px; border:none; outline:none;">
                        <button onclick="handleVerify()" style="flex:1; background:var(--gold); border:none; font-weight:900; cursor:pointer; border-radius:5px;">TRACK</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- DASHBOARD / MAP PAGE -->
        <section id="dashboard" class="view">
            <div class="container" style="max-width:900px; margin:0 auto; padding:40px; background:rgba(255,255,255,0.05); border-radius:15px; border:1px solid var(--border);">
                <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:20px;">SATELLITE VERIFICATION</h2>
                
                <div id="map"></div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px; text-align:left;">
                    <div style="background:rgba(0,0,0,0.3); padding:20px; border-left:3px solid var(--cyan);">
                        <label style="font-size:0.6rem; color:var(--cyan);">CURRENT NODE</label>
                        <p id="resLoc" style="font-size:1.1rem; font-weight:700;">--</p>
                    </div>
                    <div style="background:rgba(0,0,0,0.3); padding:20px; border-left:3px solid var(--gold);">
                        <label style="font-size:0.6rem; color:var(--gold);">STATUS</label>
                        <p id="resStat" style="font-size:1.1rem; font-weight:700;">--</p>
                    </div>
                </div>
                <p style="font-size:0.6rem; color:#666; margin-top:20px;">LAST UPDATE: <span id="resTime">--</span></p>
            </div>
        </section>
    </main>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCnRxlxUEezki8byWyLa9FljWzskEJNfDk",
            authDomain: "skyline-logistics.firebaseapp.com",
            databaseURL: "https://skyline-logistics-default-rtdb.firebaseio.com",
            projectId: "skyline-logistics"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. PAGE ROUTER
        function showPage(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 3. TRACKING LOGIC
        let map, marker;
        function handleVerify() {
            const id = document.getElementById('manifestID').value.trim();
            if(!id) return alert("Please enter a valid Transit ID");

            // Look in Firebase
            database.ref('shipments/' + id).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    showPage('dashboard');
                    
                    // Fill text details
                    document.getElementById('resLoc').innerText = data.location;
                    document.getElementById('resStat').innerText = data.status;
                    document.getElementById('resTime').innerText = data.updatedAt;

                    // Load Map
                    const pos = [data.lat, data.lng];
                    if (!map) {
                        map = L.map('map').setView(pos, 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        marker = L.marker(pos).addTo(map);
                    } else {
                        marker.setLatLng(pos);
                        map.panTo(pos);
                    }
                } else {
                    alert("ID ERROR: [" + id + "] is not recognized by Skyline Satellite.");
                }
            }).catch(e => alert("Connection Error: " + e.message));
        }

        // 4. TICKER ENGINE
        window.onload = function() {
            const track = document.getElementById('tickerTrack');
            const hubs = [{n:"LONDON", f:"🇬🇧"}, {n:"DUBAI", f:"🇦🇪"}, {n:"ZURICH", f:"🇨🇭"}];
            const fullList = Array(20).fill(hubs).flat();
            fullList.forEach(h => {
                const div = document.createElement('div');
                div.className = 'ticker-item';
                div.innerHTML = `<span>${h.f}</span> <b style="font-size:0.7rem;margin-left:10px;">${h.n} HUB / SECURE</b>`;
                track.appendChild(div);
            });
        }
    </script>
</body>
</html>
