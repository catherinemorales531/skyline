<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Admin | Institutional Dispatch & Satellite Control</title>

    <!-- 
        1. EXTERNAL LIBRARIES 
    -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Uploadcare Widget Script -->
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        /* 
           2. PROFESSIONAL ADMIN STYLING (Gold & Navy)
        */
        :root {
            --navy: #0a1523;
            --gold: #c5a059;
            --cyan: #0ea5e9;
            --white: #ffffff;
            --border: rgba(197, 160, 89, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--navy); 
            color: var(--white); 
            padding: 40px 20px; 
            text-align: center; 
        }

        .admin-container {
            max-width: 800px;
            margin: auto;
        }

        .panel { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 30px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            text-align: left;
        }

        h2 { font-family: 'Orbitron'; color: var(--gold); font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }

        label { display: block; font-size: 0.65rem; color: var(--cyan); margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }

        input, select, textarea { 
            width: 100%; padding: 15px; margin-top: 8px; border-radius: 5px; 
            border: 1px solid #333; background: #000; color: white; outline: none; 
        }

        /* UPLOAD BUTTON STYLING */
        .uploadcare--widget__button_type_open {
            background-color: var(--gold) !important;
            color: black !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
        }

        button.btn-dispatch { 
            width: 100%; padding: 20px; background: var(--gold); border: none; 
            color: black; font-weight: 900; cursor: pointer; margin-top: 25px; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        button.btn-dispatch:hover { background: #fff; }
        button.btn-dispatch:disabled { background: #444; color: #888; cursor: not-allowed; }

        .status-msg { font-size: 0.7rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <header style="margin-bottom: 40px;">
            <img src="logo.png" alt="Skyline" style="height: 60px; mix-blend-mode: screen;">
            <h1 style="font-family: 'Orbitron'; margin-top: 10px;">OPERATIONS COMMAND</h1>
            <p style="font-size: 0.7rem; color: #888;">GLOBAL SATELLITE DISPATCH & LOGISTICS</p>
        </header>


        <!-- 
            3. COMMUNICATION HUB (EMAIL + DOCUMENTS)
        -->
        <div class="panel">
            <h2>COMMUNICATION HUB</h2>
            
            <label>CUSTOMER EMAIL ADDRESS</label>
            <input type="email" id="msgEmail" placeholder="recipient@client-node.com">

            <label>MANIFEST REFERENCE / SUBJECT</label>
            <input type="text" id="msgSubject" placeholder="e.g. Manifest Update: SK-7700">

            <label>OPERATIONAL MESSAGE (BODY)</label>
            <textarea id="msgBody" placeholder="Type instructions or updates for the client..."></textarea>

            <!-- DOCUMENT UPLOAD TOOL -->
            <label>ATTACH INSTITUTIONAL DOCUMENT (PDF/IMAGE)</label>
            <div style="margin-top: 10px;">
                <input type="hidden" role="uploadcare-uploader" id="docFile" 
                       data-public-key="b85809b679eb664a42ec" 
                       data-tabs="file" />
            </div>
            <p id="uploadStatus" class="status-msg" style="color: var(--cyan);">AWAITING DOCUMENT...</p>
            
            <!-- Hidden input to store the URL after upload finishes -->
            <input type="hidden" id="docURL">

            <button class="btn-dispatch" id="msgBtn" onclick="sendBrandedEmail()">DISPATCH SECURE COMMUNICATION</button>
        </div>


        <!-- 
            4. SATELLITE CONTROL (MAP UPDATES) 
        -->
        <div class="panel" style="border-color: var(--cyan);">
            <h2>SATELLITE POSITIONING</h2>
            
            <label>MANIFEST ID TO UPDATE</label>
            <input type="text" id="shipID" placeholder="e.g. SK-7700">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>LATITUDE</label>
                    <input type="number" id="shipLat" step="any" placeholder="51.5074">
                </div>
                <div>
                    <label>LONGITUDE</label>
                    <input type="number" id="shipLng" step="any" placeholder="-0.1278">
                </div>
            </div>

            <button class="btn-dispatch" style="background: var(--cyan); color: white;" onclick="updateSatelliteMap()">UPDATE GLOBAL MAP</button>
        </div>

    </div>

    <!-- 
        5. JAVASCRIPT ENGINE
    -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCnRxlxUEezki8byWyLa9FljWzskEJNfDk",
            authDomain: "skyline-logistics.firebaseapp.com",
            databaseURL: "https://skyline-logistics-default-rtdb.firebaseio.com",
            projectId: "skyline-logistics"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- EMAILJS CONFIG ---
        emailjs.init("Y9hlfg-yd7ebI1EI3"); // Your Public Key

        // --- DOCUMENT UPLOAD LOGIC (UPLOADCARE) ---
        const widget = uploadcare.Widget('#docFile');
        
        widget.onUploadComplete(function(info) {
            // Save the link into our hidden input
            document.getElementById('docURL').value = info.cdnUrl;
            document.getElementById('uploadStatus').innerText = "DOCUMENT VERIFIED & ATTACHED";
            document.getElementById('uploadStatus').style.color = "#22c55e";
            alert("FILE SECURED: Document linked to manifest.");
        });


        // --- FUNCTION: SEND EMAIL ---
        function sendBrandedEmail() {
            const btn = document.getElementById('msgBtn');
            const email = document.getElementById('msgEmail').value;
            const docLink = document.getElementById('docURL').value;

            if (!email) return alert("Recipient Email Required");

            btn.innerText = "ENCRYPTING & SENDING...";
            btn.disabled = true;

            const templateParams = {
                to_email: email,
                manifest_id: document.getElementById('msgSubject').value,
                message: document.getElementById('msgBody').value,
                location: "Global Operations Hub (NYC)",
                doc_link: docLink ? docLink : "No digital documents attached."
            };

            emailjs.send("service_z0uiqdo", "template_s3dkn8r", templateParams)
                .then(() => {
                    alert("SUCCESS: Branded Email Dispatched to " + email);
                    btn.innerText = "DISPATCH SECURE COMMUNICATION";
                    btn.disabled = false;
                    // Reset fields
                    document.getElementById('docURL').value = "";
                    widget.value(null);
                })
                .catch((err) => {
                    alert("SATELLITE ERROR: " + JSON.stringify(err));
                    btn.disabled = false;
                });
        }


        // --- FUNCTION: UPDATE MAP ---
        function updateSatelliteMap() {
            const id = document.getElementById('shipID').value.trim();
            const lat = parseFloat(document.getElementById('shipLat').value);
            const lng = parseFloat(document.getElementById('shipLng').value);

            if (!id || isNaN(lat)) return alert("ID and Coordinates Required");

            database.ref('shipments/' + id).update({
                lat: lat,
                lng: lng,
                updatedAt: new Date().toLocaleString(),
                location: "Updated via Satellite"
            }).then(() => alert("MAP UPDATED: Pin moved for Manifest " + id));
        }
    </script>
</body>
</html>
