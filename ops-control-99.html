<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skyline Admin | Operations Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1523; --gold: #c5a059; --cyan: #0ea5e9; }
        body { background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
        .panel { max-width: 500px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--gold); border-radius: 12px; backdrop-filter: blur(10px); }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1rem; }
        button { background: var(--gold); color: black; font-weight: 900; cursor: pointer; border: none; margin-top: 25px; text-transform: uppercase; }
        button:hover { background: #fff; }
        label { display: block; text-align: left; font-size: 0.7rem; color: var(--cyan); margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        
        .request-section { max-width: 900px; margin: 40px auto; padding: 20px; border: 1px solid var(--gold); border-radius: 10px; background: rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { color: var(--gold); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 2px;">OPERATIONS COMMAND</h2>
        <p style="font-size: 0.6rem; color: #888; margin-bottom: 10px;">ADMIN PORTAL • SATELLITE CONTROL</p>

        <label>TRANSIT MANIFEST ID</label>
        <input type="text" id="shipID" placeholder="e.g. SK-10022">

        <label>CURRENT HUB LOCATION</label>
        <input type="text" id="hubLoc" placeholder="e.g. London Heathrow">

        <label>TRANSIT STATUS</label>
        <select id="shipStat">
            <option value="IN TRANSIT">IN TRANSIT</option>
            <option value="CUSTOMS CLEARANCE">CUSTOMS CLEARANCE</option>
            <option value="ON HOLD">ON HOLD</option>
            <option value="DELIVERED">DELIVERED</option>
        </select>

        <label>LATITUDE (Maps)</label>
        <input type="text" id="lat" placeholder="e.g. 51.5074">

        <label>LONGITUDE (Maps)</label>
        <input type="text" id="lng" placeholder="e.g. -0.1278">

        <button id="activateBtn">ACTIVATE MANIFEST</button>
    </div>

    <div class="request-section">
        <h3 style="color: var(--gold); font-family: 'Orbitron'; font-size: 1rem;">Incoming Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>ORIGIN</th>
                    <th>DESTINATION</th>
                    <th>ASSET</th>
                    <th>TIMESTAMP</th>
                </tr>
            </thead>
            <tbody id="requestTable">
                <!-- User requests from index.html will appear here -->
            </tbody>
        </table>
    </div>

    <!-- FIREBASE COMPAT LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // 1. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCnRxlxUEezki8byWyLa9FljWzskEJNfDk",
            authDomain: "skyline-logistics.firebaseapp.com",
            databaseURL: "https://skyline-logistics-default-rtdb.firebaseio.com",
            projectId: "skyline-logistics",
            storageBucket: "skyline-logistics.firebasestorage.app",
            messagingSenderId: "111278945331",
            appId: "1:111278945331:web:5565f3b4504fd62ecd5f46"
        };

        // 2. INITIALIZE
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. ACTIVATE MANIFEST FUNCTION
        document.getElementById('activateBtn').onclick = function() {
            const id = document.getElementById('shipID').value.trim();
            const loc = document.getElementById('hubLoc').value.trim();
            const stat = document.getElementById('shipStat').value;
            const lat = document.getElementById('lat').value.trim();
            const lng = document.getElementById('lng').value.trim();

            if(!id || !loc || !lat || !lng) {
                alert("ERROR: All fields (ID, Location, Lat, Lng) are required for Satellite Tracking.");
                return;
            }

            // Save to Firebase
            database.ref('shipments/' + id).set({
                location: loc,
                status: stat,
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                updatedAt: new Date().toLocaleString()
            })
            .then(() => {
                alert("SUCCESS: Manifest " + id + " is now LIVE on the Satellite Map.");
                // Optional: Clear fields
                document.getElementById('shipID').value = "";
                document.getElementById('hubLoc').value = "";
            })
            .catch((error) => {
                alert("CONNECTION ERROR: " + error.message);
            });
        };

        // 4. LISTEN FOR INCOMING USER REQUESTS
        database.ref('requests').on('value', (snapshot) => {
            const table = document.getElementById('requestTable');
            table.innerHTML = ""; // Clear
            snapshot.forEach((child) => {
                const data = child.val();
                const row = `<tr>
                    <td>${data.origin}</td>
                    <td>${data.dest}</td>
                    <td>${data.asset || 'Standard'}</td>
                    <td>${data.time}</td>
                </tr>`;
                table.innerHTML += row;
            });
        });
    </script>
</body>
</html>
