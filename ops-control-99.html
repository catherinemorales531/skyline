<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skyline Admin | Operations Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1523; --gold: #c5a059; --cyan: #0ea5e9; }
        body { background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
        .panel { max-width: 450px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--gold); border-radius: 12px; backdrop-filter: blur(10px); }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1rem; }
        
        /* Fixed Button Colors */
        #activateBtn { background: var(--gold); color: black; font-weight: 900; cursor: pointer; border: none; margin-top: 25px; text-transform: uppercase; }
        #activateBtn:hover { background: #fff; }
        #activateBtn:disabled { background: #444; color: #888; cursor: not-allowed; }

        label { display: block; text-align: left; font-size: 0.65rem; color: var(--cyan); margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .req-box { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #333; background: rgba(0,0,0,0.3); border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        th, td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        th { color: var(--gold); }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 2px;">OPERATIONS COMMAND</h2>
        
        <label>TRANSIT MANIFEST ID</label>
        <input type="text" id="shipID" placeholder="e.g. SK-10022">

        <label>CURRENT HUB LOCATION</label>
        <input type="text" id="hubLoc" placeholder="e.g. London Hub">

        <label>STATUS</label>
        <select id="shipStat">
            <option value="IN TRANSIT">IN TRANSIT</option>
            <option value="CUSTOMS CLEARANCE">CUSTOMS CLEARANCE</option>
            <option value="ON HOLD">ON HOLD</option>
            <option value="DELIVERED">DELIVERED</option>
        </select>

        <label>MAP COORDINATES (LATITUDE)</label>
        <input type="number" id="lat" step="any" placeholder="e.g. 51.5074">

        <label>MAP COORDINATES (LONGITUDE)</label>
        <input type="number" id="lng" step="any" placeholder="e.g. -0.1278">

        <button id="activateBtn">ACTIVATE MANIFEST</button>
    </div>

    <div class="req-box">
        <h3 style="color: var(--gold); font-size: 0.8rem;">INCOMING USER REQUESTS</h3>
        <table id="requestTable">
            <tr><th>ORIGIN</th><th>DESTINATION</th><th>TIMESTAMP</th></tr>
        </table>
    </div>

    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // 1. CONFIG (Verify these match your Firebase Project Settings)
        const firebaseConfig = {
            apiKey: "AIzaSyCnRxlxUEezki8byWyLa9FljWzskEJNfDk",
            authDomain: "skyline-logistics.firebaseapp.com",
            databaseURL: "https://skyline-logistics-default-rtdb.firebaseio.com",
            projectId: "skyline-logistics",
            storageBucket: "skyline-logistics.firebasestorage.app",
            messagingSenderId: "111278945331",
            appId: "1:111278945331:web:5565f3b4504fd62ecd5f46"
        };

        // 2. INITIALIZE
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. THE ACTION FUNCTION
        const btn = document.getElementById('activateBtn');

        btn.onclick = function() {
            // Get values
            const id = document.getElementById('shipID').value.trim();
            const loc = document.getElementById('hubLoc').value.trim();
            const stat = document.getElementById('shipStat').value;
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;

            // Check if fields are empty
            if (!id || !loc || !lat || !lng) {
                alert("ATTENTION: All tracking fields and coordinates must be filled.");
                return;
            }

            // Visual feedback
            btn.disabled = true;
            btn.innerText = "UPLOADING TO SATELLITE...";

            // Save to Firebase
            database.ref('shipments/' + id).set({
                location: loc,
                status: stat,
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                updatedAt: new Date().toLocaleString()
            })
            .then(() => {
                alert("SUCCESS: Manifest " + id + " is now LIVE.");
                btn.disabled = false;
                btn.innerText = "ACTIVATE MANIFEST";
                // Clear boxes
                document.getElementById('shipID').value = "";
                document.getElementById('hubLoc').value = "";
            })
            .catch((error) => {
                alert("CRITICAL ERROR: " + error.message);
                btn.disabled = false;
                btn.innerText = "ACTIVATE MANIFEST";
            });
        };

        // 4. LOAD USER REQUESTS
        database.ref('requests').on('value', (snapshot) => {
            const table = document.getElementById('requestTable');
            table.innerHTML = "<tr><th>ORIGIN</th><th>DESTINATION</th><th>TIMESTAMP</th></tr>";
            snapshot.forEach((child) => {
                const data = child.val();
                table.innerHTML += `<tr><td>${data.origin}</td><td>${data.dest}</td><td>${data.time}</td></tr>`;
            });
        });
    </script>
</body>
</html>
