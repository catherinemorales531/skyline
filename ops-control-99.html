<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skyline Admin | Global Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1523; --gold: #c5a059; --cyan: #0ea5e9; }
        body { background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
        .panel { max-width: 450px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--gold); border-radius: 12px; backdrop-filter: blur(10px); }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1rem; }
        
        /* Professional Button States */
        #activateBtn { background: var(--gold); color: black; font-weight: 900; cursor: pointer; border: none; margin-top: 25px; transition: 0.3s; text-transform: uppercase; }
        #activateBtn:hover { background: #fff; }
        #activateBtn:disabled { background: #444; color: #888; cursor: not-allowed; }

        label { display: block; text-align: left; font-size: 0.7rem; color: var(--cyan); margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        
        .incoming-requests { max-width: 950px; margin: 40px auto; background: rgba(255,255,255,0.06); border:1px solid #c5a059; border-radius: 12px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.8rem; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { color: var(--gold); background: rgba(255,255,255,0.05); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="letter-spacing: 2px; font-family: 'Orbitron'; color: var(--gold);">OPERATIONS COMMAND</h2>
        <p style="font-size: 0.6rem; color: #888; margin-bottom: 20px;">ADMIN PORTAL • SATELLITE CONTROL</p>

        <label>TRANSIT MANIFEST ID</label>
        <input type="text" id="shipID" placeholder="e.g. SK-10022">

        <label>CURRENT HUB LOCATION</label>
        <input type="text" id="hubLoc" placeholder="e.g. London Heathrow">

        <label>TRANSIT STATUS</label>
        <select id="shipStat">
            <option value="IN TRANSIT">IN TRANSIT</option>
            <option value="CUSTOMS CLEARANCE">CUSTOMS CLEARANCE</option>
            <option value="ON HOLD">ON HOLD</option>
            <option value="DELIVERED">DELIVERED</option>
        </select>

        <label>Latitude (Coordinates)</label>
        <input type="number" id="shipLat" step="any" placeholder="e.g. 51.4700">

        <label>Longitude (Coordinates)</label>
        <input type="number" id="shipLng" step="any" placeholder="e.g. -0.4543">

        <button id="activateBtn">ACTIVATE MANIFEST</button>
    </div>

    <section class="incoming-requests">
        <h2 style="color: #c5a059; font-family: 'Orbitron'; font-size: 1rem; text-align: left;">INCOMING CLIENT REQUESTS</h2>
        <table>
            <thead>
                <tr>
                    <th>Request ID</th>
                    <th>Origin</th>
                    <th>Destination</th>
                    <th>Asset Class</th>
                    <th>Weight</th>
                    <th>Timestamp</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="requeststbody">
                <tr><td colspan="7" style="text-align:center; padding:20px;">Initializing Satellite Link...</td></tr>
            </tbody>
        </table>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

        const database = firebase.database();

        // 3. RENDER TABLE FUNCTION (Attached to window for global access)
        window.renderRequestsTable = function(snapshot) {
            const tbody = document.getElementById('requeststbody');
            tbody.innerHTML = '';

            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="7" style="padding: 20px; text-align: center; color: #888;">NO PENDING REQUESTS FOUND</td></tr>';
                return;
            }

            snapshot.forEach((child) => {
                const key = child.key;
                const request = child.val();
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td>${key}</td>
                    <td>${request.origin || '-'}</td>
                    <td>${request.dest || request.destination || '-'}</td>
                    <td>${request.asset || request.assetClass || '-'}</td>
                    <td>${request.weight || '-'} KG</td>
                    <td>${request.time || request.timestamp || '-'}</td>
                    <td>
                        <button style="width:auto; padding: 5px 10px; font-size:0.7rem; background:#0ea5e9; color:white; margin:0;" onclick="window.generateIdForRequest('${key}')">ISSUE ID</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        };

        // 4. ACTION: GENERATE ID FOR CLIENT
        window.generateIdForRequest = function(key) {
            const generatedId = 'SK-' + Math.floor(100000 + Math.random() * 900000);
            database.ref('requests/' + key).update({ generatedId: generatedId })
                .then(() => alert('SUCCESS: Transit ID ' + generatedId + ' issued to client.'))
                .catch((error) => alert('Error: ' + error.message));
        };

        // 5. LISTEN FOR REQUESTS
        database.ref('requests').on('value', (snapshot) => {
            window.renderRequestsTable(snapshot);
        });
