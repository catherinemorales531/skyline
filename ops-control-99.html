<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Skyline Admin | Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1523; --gold: #c5a059; --cyan: #0ea5e9; }
        body { background: var(--navy); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
        .panel { max-width: 450px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid var(--gold); border-radius: 12px; }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; font-size: 1rem; }
        #activateBtn { background: var(--gold); color: black; font-weight: 900; cursor: pointer; border: none; margin-top: 25px; }
        label { display: block; text-align: left; font-size: 0.7rem; color: var(--cyan); margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="font-family: 'Orbitron'; color: var(--gold);">COMMAND CENTER</h2>
        <label>MANIFEST ID</label>
        <input type="text" id="shipID" placeholder="e.g. SK-7700">
        <label>HUB LOCATION</label>
        <input type="text" id="hubLoc" placeholder="e.g. Dubai Hub">
        <label>LATITUDE / LONGITUDE</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="shipLat" step="any" placeholder="Lat">
            <input type="number" id="shipLng" step="any" placeholder="Lng">
        </div>
        <label>STATUS</label>
        <select id="shipStat"><option>IN TRANSIT</option><option>ON HOLD</option><option>DELIVERED</option></select>
        <button id="activateBtn">ACTIVATE MANIFEST</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnRxlxUEezki8byWyLa9FljWzskEJNfDk",
            authDomain: "skyline-logistics.firebaseapp.com",
            databaseURL: "https://skyline-logistics-default-rtdb.firebaseio.com",
            projectId: "skyline-logistics"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('activateBtn').onclick = function() {
            const id = document.getElementById('shipID').value.trim();
            const loc = document.getElementById('hubLoc').value.trim();
            const lat = parseFloat(document.getElementById('shipLat').value);
            const lng = parseFloat(document.getElementById('shipLng').value);
            const stat = document.getElementById('shipStat').value;

            if(!id || !loc || isNaN(lat)) return alert("Please fill all fields!");

            this.innerText = "UPLOADING...";
            database.ref('shipments/' + id).set({
                location: loc, lat: lat, lng: lng, status: stat, updatedAt: new Date().toLocaleString()
            }).then(() => {
                alert("SUCCESS: Manifest " + id + " is LIVE.");
                location.reload();
            });
        };
    </script>
</body>
</html>
